<!doctype html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard úkolů</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f9f7;
      --bg-soft: #ecf6f1;
      --panel: #ffffff;
      --panel-2: #f6fbf8;
      --text: #0f2a21;
      --muted: #5f7a71;
      --accent: #11a868;
      --accent-2: #0e8a56;
      --todo: #226fdf;
      --doing: #d9821a;
      --done: #10a468;
      --border: #d9e9e1;
      --shadow: 0 12px 30px rgba(16, 84, 58, 0.08);
      --btn-secondary-bg: #eaf6ff;
      --btn-secondary-border: #b9daf5;
      --btn-secondary-text: #1f5d96;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Manrope", "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 5% 5%, #d9f4e8 0, transparent 28%),
        radial-gradient(circle at 95% 10%, #d8eef8 0, transparent 30%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      gap: 12px;
      flex-wrap: wrap;
      background: linear-gradient(120deg, #ffffff, #eef9f3 70%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    h1 { margin: 0; font-size: 28px; }
    .muted { color: var(--muted); }
    .grid { display: grid; gap: 16px; }

    .stats {
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      margin-bottom: 16px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      margin: 8px 0 0;
    }
    .stat-sub {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    input, select, button {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
    }

    button { cursor: pointer; transition: 0.15s ease; }
    button:hover { opacity: 0.95; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    .btn-primary {
      background: var(--accent);
      color: #ffffff;
      border: none;
      font-weight: 600;
    }
    .btn-primary:hover {
      background: var(--accent-2);
      opacity: 1;
    }
    button:not(.btn-primary) {
      background: var(--btn-secondary-bg);
      border-color: var(--btn-secondary-border);
      color: var(--btn-secondary-text);
      font-weight: 600;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto auto auto auto auto auto auto;
      gap: 10px;
      margin-bottom: 12px;
    }
    .cloud-status {
      font-size: 12px;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      padding: 0 4px;
    }

    .view-switch {
      display: flex;
      gap: 8px;
    }

    .view-switch button.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(17, 168, 104, 0.2);
      background: #e9f8f2;
    }

    .new-task-form {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr auto;
      gap: 10px;
      margin-top: 10px;
    }

    .task-list {
      display: grid;
      gap: 10px;
      max-height: 58vh;
      overflow: auto;
      padding-right: 4px;
    }

    .task-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #ffffff;
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: start;
      box-shadow: 0 6px 14px rgba(12, 53, 39, 0.06);
    }

    .task-item[draggable="true"] { cursor: grab; }
    .task-item.dragging { opacity: 0.65; }
    .task-main { display: grid; gap: 6px; }
    .task-title { margin: 0; font-size: 16px; }

    .task-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 12px;
    }

    .tag {
      border-radius: 999px;
      padding: 5px 10px;
      border: 1px solid var(--border);
      font-weight: 700;
      letter-spacing: 0.1px;
    }

    .status-todo {
      background: #d8e9ff;
      color: #0e4aa3;
      border-color: #8bb5f2;
    }
    .status-doing {
      background: #ffe7bf;
      color: #9a5300;
      border-color: #f0b767;
    }
    .status-done {
      background: #d5f5e7;
      color: #0b7d4d;
      border-color: #7bd5ad;
    }
    .priority-low {
      color: #0f5eb1;
      border-color: #9ac4f6;
      background: #e8f3ff;
    }
    .priority-medium {
      color: #975300;
      border-color: #efbc7d;
      background: #fff0d9;
    }
    .priority-high {
      color: #a11e2f;
      border-color: #f2a0ad;
      background: #ffe4e8;
    }
    .overdue {
      color: #b4233a;
      font-weight: 700;
      border-color: #ea8e9d;
      background: #ffe2e7;
    }

    .task-actions {
      display: grid;
      gap: 8px;
      min-width: 160px;
    }

    .empty {
      padding: 20px;
      border: 1px dashed var(--border);
      border-radius: 10px;
      text-align: center;
      color: var(--muted);
    }

    .kanban-board {
      display: grid;
      grid-template-columns: repeat(3, minmax(240px, 1fr));
      gap: 12px;
    }

    .kanban-col {
      background: #f7fcfa;
      border: 1px solid var(--border);
      border-radius: 10px;
      min-height: 350px;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .kanban-head {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
      background: linear-gradient(180deg, #ffffff, #f2faf6);
    }

    .kanban-dropzone {
      padding: 10px;
      display: grid;
      gap: 10px;
      align-content: start;
      min-height: 280px;
    }

    .kanban-dropzone.drag-over {
      background: rgba(17, 168, 104, 0.09);
      outline: 1px dashed rgba(17, 168, 104, 0.7);
      border-radius: 8px;
    }

    .hidden { display: none; }

    @media (max-width: 980px) {
      .toolbar { grid-template-columns: 1fr 1fr; }
      .new-task-form { grid-template-columns: 1fr 1fr; }
      .task-item { grid-template-columns: 1fr; }
      .task-actions { min-width: 0; }
      .kanban-board { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>Dashboard úkolů</h1>
        <div class="muted">Moderní přehled práce: jednoduše, chytře, rychle.</div>
      </div>
      <button id="resetDemo" title="Smaže všechny úkoly">Vymazat vše</button>
    </div>

    <div class="grid stats">
      <div class="card"><div class="muted">Celkem</div><div class="stat-value" id="statTotal">0</div></div>
      <div class="card"><div class="muted">K vyřízení</div><div class="stat-value" id="statTodo">0</div></div>
      <div class="card"><div class="muted">Rozpracované</div><div class="stat-value" id="statDoing">0</div></div>
      <div class="card"><div class="muted">Dokončené</div><div class="stat-value" id="statDone">0</div></div>
      <div class="card"><div class="muted">Po termínu</div><div class="stat-value" id="statOverdue">0</div></div>
      <div class="card"><div class="muted">Dokončeno dnes</div><div class="stat-value" id="statDoneToday">0</div></div>
      <div class="card"><div class="muted">Vysoká priorita (open)</div><div class="stat-value" id="statHighOpen">0</div></div>
      <div class="card"><div class="muted">Do 7 dnů</div><div class="stat-value" id="statDueSoon">0</div></div>
      <div class="card">
        <div class="muted">Úspěšnost</div>
        <div class="stat-value" id="statCompletion">0%</div>
        <div class="stat-sub">Dokončené / všechny úkoly</div>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <input id="searchInput" type="text" placeholder="Hledat podle názvu..." />
        <select id="filterStatus">
          <option value="all">Všechny stavy</option>
          <option value="todo">K vyřízení</option>
          <option value="doing">Rozpracované</option>
          <option value="done">Dokončené</option>
        </select>
        <select id="filterPriority">
          <option value="all">Všechny priority</option>
          <option value="low">Nízká</option>
          <option value="medium">Střední</option>
          <option value="high">Vysoká</option>
        </select>
        <select id="sortBy">
          <option value="dueAsc">Termín: nejbližší</option>
          <option value="dueDesc">Termín: nejpozdější</option>
          <option value="newest">Nejnovější</option>
          <option value="oldest">Nejstarší</option>
        </select>
        <button id="exportCsvBtn">Export CSV</button>
        <button id="importCsvBtn">Import CSV</button>
        <button id="copyReportBtn">Kopírovat report</button>
        <button id="emailReportBtn">Poslat e-mailem</button>
        <button id="connectCloudBtn">Cloud připojení</button>
        <button id="syncNowBtn">Sync teď</button>
        <div id="cloudStatus" class="cloud-status">Cloud: lokální režim</div>
      </div>
      <input id="csvFileInput" type="file" accept=".csv,text/csv" class="hidden" />

      <div class="new-task-form">
        <input id="newTitle" type="text" placeholder="Název úkolu" />
        <select id="newPriority">
          <option value="low">Nízká priorita</option>
          <option value="medium" selected>Střední priorita</option>
          <option value="high">Vysoká priorita</option>
        </select>
        <select id="newStatus">
          <option value="todo" selected>K vyřízení</option>
          <option value="doing">Rozpracované</option>
          <option value="done">Dokončené</option>
        </select>
        <input id="newDueDate" type="date" />
        <button id="addTaskBtn" class="btn-primary">Přidat úkol</button>
      </div>

      <div class="view-switch" style="margin-top: 12px;">
        <button id="listViewBtn" data-view="list">Seznam</button>
        <button id="kanbanViewBtn" class="active" data-view="kanban">Kanban</button>
      </div>
    </div>

    <div id="listContainer" class="card" style="margin-top: 16px;">
      <div class="task-list" id="taskList"></div>
    </div>

    <div id="kanbanContainer" class="card hidden" style="margin-top: 16px;">
      <div class="kanban-board">
        <div class="kanban-col">
          <div class="kanban-head"><span>K vyřízení</span><span id="todoCount">0</span></div>
          <div class="kanban-dropzone" data-status="todo" id="colTodo"></div>
        </div>
        <div class="kanban-col">
          <div class="kanban-head"><span>Rozpracované</span><span id="doingCount">0</span></div>
          <div class="kanban-dropzone" data-status="doing" id="colDoing"></div>
        </div>
        <div class="kanban-col">
          <div class="kanban-head"><span>Dokončené</span><span id="doneCount">0</span></div>
          <div class="kanban-dropzone" data-status="done" id="colDone"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const STORAGE_KEY = "taskDashboardDataV2";
    const LEGACY_STORAGE_KEY = "taskDashboardDataV1";
    const CLOUD_CONFIG_KEY = "taskDashboardSupabaseConfigV1";
    const CLOUD_TABLE = "task_dashboard_tasks";

    let tasks = loadTasks();
    let currentView = "kanban";
    let draggingTaskId = null;
    let supabaseClient = null;
    let cloudConnected = false;
    let hasUnsyncedLocalChanges = false;
    let syncInProgress = false;
    let syncDebounceTimer = null;
    let syncPollTimer = null;

    const el = {
      statTotal: document.getElementById("statTotal"),
      statTodo: document.getElementById("statTodo"),
      statDoing: document.getElementById("statDoing"),
      statDone: document.getElementById("statDone"),
      statOverdue: document.getElementById("statOverdue"),
      statDoneToday: document.getElementById("statDoneToday"),
      statHighOpen: document.getElementById("statHighOpen"),
      statDueSoon: document.getElementById("statDueSoon"),
      statCompletion: document.getElementById("statCompletion"),
      taskList: document.getElementById("taskList"),
      colTodo: document.getElementById("colTodo"),
      colDoing: document.getElementById("colDoing"),
      colDone: document.getElementById("colDone"),
      todoCount: document.getElementById("todoCount"),
      doingCount: document.getElementById("doingCount"),
      doneCount: document.getElementById("doneCount"),
      searchInput: document.getElementById("searchInput"),
      filterStatus: document.getElementById("filterStatus"),
      filterPriority: document.getElementById("filterPriority"),
      sortBy: document.getElementById("sortBy"),
      newTitle: document.getElementById("newTitle"),
      newPriority: document.getElementById("newPriority"),
      newStatus: document.getElementById("newStatus"),
      newDueDate: document.getElementById("newDueDate"),
      addTaskBtn: document.getElementById("addTaskBtn"),
      resetDemo: document.getElementById("resetDemo"),
      listViewBtn: document.getElementById("listViewBtn"),
      kanbanViewBtn: document.getElementById("kanbanViewBtn"),
      listContainer: document.getElementById("listContainer"),
      kanbanContainer: document.getElementById("kanbanContainer"),
      exportCsvBtn: document.getElementById("exportCsvBtn"),
      importCsvBtn: document.getElementById("importCsvBtn"),
      copyReportBtn: document.getElementById("copyReportBtn"),
      emailReportBtn: document.getElementById("emailReportBtn"),
      connectCloudBtn: document.getElementById("connectCloudBtn"),
      syncNowBtn: document.getElementById("syncNowBtn"),
      cloudStatus: document.getElementById("cloudStatus"),
      csvFileInput: document.getElementById("csvFileInput")
    };

    function loadTasks() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed.map(normalizeTask) : sampleTasks();
        }
        const legacyRaw = localStorage.getItem(LEGACY_STORAGE_KEY);
        if (legacyRaw) {
          const legacyParsed = JSON.parse(legacyRaw);
          if (Array.isArray(legacyParsed)) return legacyParsed.map(normalizeTask);
        }
        return sampleTasks();
      } catch {
        return sampleTasks();
      }
    }

    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function sampleTasks() {
      const today = new Date();
      const plusDays = (d) => {
        const t = new Date(today);
        t.setDate(t.getDate() + d);
        return t.toISOString().slice(0, 10);
      };
      return [
        createTask("Připravit měsíční report", "high", "doing", plusDays(1)),
        createTask("Zkontrolovat backlog", "medium", "todo", plusDays(3)),
        createTask("Uzavřít sprint retrospektivu", "low", "done", plusDays(-1))
      ];
    }

    function createTask(title, priority, status, dueDate) {
      const normalizedStatus = normalizeStatus(status);
      const now = Date.now();
      return {
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
        title: title.trim(),
        priority: normalizePriority(priority),
        status: normalizedStatus,
        dueDate: normalizeDate(dueDate),
        createdAt: now,
        completedAt: normalizedStatus === "done" ? now : null,
        updatedAt: now
      };
    }

    function normalizeTask(task) {
      const status = normalizeStatus(task.status);
      const createdAt = Number.isFinite(Number(task.createdAt)) ? Number(task.createdAt) : Date.now();
      const completedAtRaw = task.completedAt === null || task.completedAt === undefined ? null : Number(task.completedAt);
      const completedAt = Number.isFinite(completedAtRaw) ? completedAtRaw : null;
      const updatedAt = Number.isFinite(Number(task.updatedAt))
        ? Number(task.updatedAt)
        : (completedAt || createdAt || Date.now());
      return {
        id: String(task.id || (crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()))),
        title: String(task.title || "").trim(),
        priority: normalizePriority(task.priority),
        status,
        dueDate: normalizeDate(task.dueDate),
        createdAt,
        completedAt: status === "done" ? (completedAt || updatedAt) : null,
        updatedAt
      };
    }

    function normalizeStatus(value) {
      return ["todo", "doing", "done"].includes(value) ? value : "todo";
    }

    function normalizePriority(value) {
      return ["low", "medium", "high"].includes(value) ? value : "medium";
    }

    function normalizeDate(value) {
      if (!value) return "";
      return /^\d{4}-\d{2}-\d{2}$/.test(value) ? value : "";
    }

    function isOverdue(task) {
      if (!task.dueDate || task.status === "done") return false;
      const today = new Date();
      const due = new Date(task.dueDate + "T23:59:59");
      return due < today;
    }

    function formatDueDate(dateStr) {
      if (!dateStr) return "Bez termínu";
      const d = new Date(dateStr + "T00:00:00");
      return d.toLocaleDateString("cs-CZ");
    }

    function nextStatus(current) {
      if (current === "todo") return "doing";
      if (current === "doing") return "done";
      return "todo";
    }

    function statusLabel(status) {
      return status === "todo" ? "K vyřízení" : status === "doing" ? "Rozpracované" : "Dokončené";
    }

    function priorityLabel(priority) {
      return priority === "low" ? "Nízká" : priority === "medium" ? "Střední" : "Vysoká";
    }

    function filteredTasks() {
      const query = el.searchInput.value.trim().toLowerCase();
      const status = el.filterStatus.value;
      const priority = el.filterPriority.value;
      const sortBy = el.sortBy.value;

      const out = tasks.filter((t) => {
        const q = !query || t.title.toLowerCase().includes(query);
        const s = status === "all" || t.status === status;
        const p = priority === "all" || t.priority === priority;
        return q && s && p;
      });

      out.sort((a, b) => {
        if (sortBy === "newest") return b.createdAt - a.createdAt;
        if (sortBy === "oldest") return a.createdAt - b.createdAt;
        const da = a.dueDate ? new Date(a.dueDate).getTime() : (sortBy === "dueAsc" ? Infinity : -Infinity);
        const db = b.dueDate ? new Date(b.dueDate).getTime() : (sortBy === "dueAsc" ? Infinity : -Infinity);
        return sortBy === "dueAsc" ? da - db : db - da;
      });

      return out;
    }

    function updateStats() {
      const total = tasks.length;
      const todo = tasks.filter((t) => t.status === "todo").length;
      const doing = tasks.filter((t) => t.status === "doing").length;
      const done = tasks.filter((t) => t.status === "done").length;
      const overdue = tasks.filter(isOverdue).length;
      const highOpen = tasks.filter((t) => t.priority === "high" && t.status !== "done").length;
      const dueSoon = tasks.filter(isDueSoon).length;
      const doneToday = tasks.filter(isCompletedToday).length;
      const completion = total ? Math.round((done / total) * 100) : 0;

      el.statTotal.textContent = total;
      el.statTodo.textContent = todo;
      el.statDoing.textContent = doing;
      el.statDone.textContent = done;
      el.statOverdue.textContent = overdue;
      el.statHighOpen.textContent = highOpen;
      el.statDueSoon.textContent = dueSoon;
      el.statDoneToday.textContent = doneToday;
      el.statCompletion.textContent = completion + "%";
      el.todoCount.textContent = todo;
      el.doingCount.textContent = doing;
      el.doneCount.textContent = done;
    }

    function isDueSoon(task) {
      if (!task.dueDate || task.status === "done") return false;
      const now = new Date();
      const due = new Date(task.dueDate + "T23:59:59");
      const diff = due.getTime() - now.getTime();
      return diff >= 0 && diff <= 7 * 24 * 60 * 60 * 1000;
    }

    function isCompletedToday(task) {
      if (!task.completedAt) return false;
      const d = new Date(task.completedAt);
      const now = new Date();
      return d.getFullYear() === now.getFullYear()
        && d.getMonth() === now.getMonth()
        && d.getDate() === now.getDate();
    }

    function taskCardHtml(task, draggable) {
      const overdue = isOverdue(task);
      return `
        <div class="task-item" ${draggable ? 'draggable="true"' : ""} data-task-id="${task.id}">
          <div class="task-main">
            <h3 class="task-title">${escapeHtml(task.title)}</h3>
            <div class="task-meta">
              <span class="tag status-${task.status}">${statusLabel(task.status)}</span>
              <span class="tag priority-${task.priority}">Priorita: ${priorityLabel(task.priority)}</span>
              <span class="tag ${overdue ? "overdue" : ""}">
                ${overdue ? "Po termínu: " : "Termín: "}${formatDueDate(task.dueDate)}
              </span>
            </div>
          </div>
          <div class="task-actions">
            <button data-action="advance" data-id="${task.id}">Posunout stav</button>
            <button data-action="delete" data-id="${task.id}" style="color: #fecaca;">Smazat</button>
          </div>
        </div>
      `;
    }

    function renderList() {
      const list = filteredTasks();
      if (list.length === 0) {
        el.taskList.innerHTML = '<div class="empty">Žádné úkoly pro aktuální filtr.</div>';
        return;
      }
      el.taskList.innerHTML = list.map((task) => taskCardHtml(task, false)).join("");
    }

    function renderKanban() {
      const list = filteredTasks();
      const byStatus = { todo: [], doing: [], done: [] };
      list.forEach((task) => byStatus[task.status].push(task));

      el.colTodo.innerHTML = byStatus.todo.length
        ? byStatus.todo.map((task) => taskCardHtml(task, true)).join("")
        : '<div class="empty">Žádné úkoly</div>';
      el.colDoing.innerHTML = byStatus.doing.length
        ? byStatus.doing.map((task) => taskCardHtml(task, true)).join("")
        : '<div class="empty">Žádné úkoly</div>';
      el.colDone.innerHTML = byStatus.done.length
        ? byStatus.done.map((task) => taskCardHtml(task, true)).join("")
        : '<div class="empty">Žádné úkoly</div>';
    }

    function setView(view) {
      currentView = view;
      const isList = view === "list";
      el.listContainer.classList.toggle("hidden", !isList);
      el.kanbanContainer.classList.toggle("hidden", isList);
      el.listViewBtn.classList.toggle("active", isList);
      el.kanbanViewBtn.classList.toggle("active", !isList);
      render();
    }

    function render() {
      updateStats();
      renderList();
      renderKanban();
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function addTask() {
      const title = el.newTitle.value.trim();
      if (!title) {
        alert("Zadej název úkolu.");
        return;
      }

      const task = createTask(
        title,
        el.newPriority.value,
        el.newStatus.value,
        el.newDueDate.value
      );
      tasks.unshift(task);
      markDirtyAndSave();
      el.newTitle.value = "";
      render();
    }

    function setTaskStatus(taskId, status) {
      const idx = tasks.findIndex((t) => t.id === taskId);
      if (idx < 0) return;
      const next = normalizeStatus(status);
      tasks[idx].status = next;
      tasks[idx].completedAt = next === "done" ? Date.now() : null;
      tasks[idx].updatedAt = Date.now();
      markDirtyAndSave();
      render();
    }

    function markDirtyAndSave() {
      hasUnsyncedLocalChanges = true;
      saveTasks();
      scheduleCloudSync();
    }

    function buildReportText() {
      const total = tasks.length;
      const todo = tasks.filter((t) => t.status === "todo").length;
      const doing = tasks.filter((t) => t.status === "doing").length;
      const done = tasks.filter((t) => t.status === "done").length;
      const overdue = tasks.filter(isOverdue).length;
      const dueSoon = tasks.filter(isDueSoon).length;
      const highOpen = tasks.filter((t) => t.priority === "high" && t.status !== "done").length;
      const completion = total ? Math.round((done / total) * 100) : 0;

      const topOpen = filteredTasks()
        .filter((t) => t.status !== "done")
        .slice(0, 5)
        .map((t, i) => `${i + 1}. ${t.title} (${priorityLabel(t.priority)}, ${statusLabel(t.status)})`);

      return [
        "Dashboard ukolu - rychly report",
        `Datum: ${new Date().toLocaleString("cs-CZ")}`,
        "",
        `Celkem: ${total}`,
        `K vyrizeni: ${todo}`,
        `Rozpracovane: ${doing}`,
        `Dokoncene: ${done}`,
        `Uspesnost: ${completion}%`,
        `Po terminu: ${overdue}`,
        `Do 7 dnu: ${dueSoon}`,
        `Vysoka priorita (open): ${highOpen}`,
        "",
        "Top otevrene ukoly:",
        ...(topOpen.length ? topOpen : ["- Zadny otevreny ukol"])
      ].join("\n");
    }

    async function copyReport() {
      const text = buildReportText();
      try {
        await navigator.clipboard.writeText(text);
        alert("Report zkopirovan do schranky.");
      } catch {
        alert("Nepodarilo se zkopirovat report. Zkus jiny prohlizec.");
      }
    }

    function emailReport() {
      const subject = encodeURIComponent("Report ukolu");
      const body = encodeURIComponent(buildReportText());
      window.location.href = `mailto:?subject=${subject}&body=${body}`;
    }

    function updateCloudStatus(text) {
      el.cloudStatus.textContent = text;
    }

    function getCloudConfig() {
      try {
        const raw = localStorage.getItem(CLOUD_CONFIG_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || !parsed.url || !parsed.anonKey) return null;
        return parsed;
      } catch {
        return null;
      }
    }

    function setCloudConfig(url, anonKey) {
      localStorage.setItem(CLOUD_CONFIG_KEY, JSON.stringify({ url, anonKey }));
    }

    function taskToCloudRow(task) {
      return {
        id: task.id,
        title: task.title,
        priority: task.priority,
        status: task.status,
        due_date: task.dueDate || null,
        created_at_ms: task.createdAt,
        completed_at_ms: task.completedAt,
        updated_at_ms: task.updatedAt || task.createdAt
      };
    }

    function cloudRowToTask(row) {
      return normalizeTask({
        id: row.id,
        title: row.title,
        priority: row.priority,
        status: row.status,
        dueDate: row.due_date || "",
        createdAt: row.created_at_ms,
        completedAt: row.completed_at_ms,
        updatedAt: row.updated_at_ms
      });
    }

    async function connectCloud(url, anonKey) {
      if (!window.supabase || !window.supabase.createClient) {
        alert("Nepodarilo se nacist Supabase knihovnu.");
        return false;
      }
      try {
        supabaseClient = window.supabase.createClient(url, anonKey);
        const { error } = await supabaseClient.from(CLOUD_TABLE).select("id").limit(1);
        if (error) throw error;
        cloudConnected = true;
        setCloudConfig(url, anonKey);
        updateCloudStatus("Cloud: pripojeno");
        startCloudPolling();
        await initialCloudSync();
        alert("Cloud uspesne pripojen.");
        return true;
      } catch (err) {
        cloudConnected = false;
        updateCloudStatus("Cloud: chyba pripojeni");
        const message = err && err.message ? err.message : "Neznamy problem";
        alert(`Cloud se nepodarilo pripojit.\n\nDetail: ${message}\n\nZkontroluj URL, publishable key a SQL tabulku v Supabase.`);
        return false;
      }
    }

    async function initialCloudSync() {
      if (!cloudConnected) return;
      updateCloudStatus("Cloud: prvotni sync...");
      const { data, error } = await supabaseClient.from(CLOUD_TABLE).select("*");
      if (error) {
        updateCloudStatus("Cloud: chyba syncu");
        return;
      }
      if (data && data.length) {
        tasks = data.map(cloudRowToTask);
        hasUnsyncedLocalChanges = false;
        saveTasks();
        render();
        updateCloudStatus("Cloud: aktualni");
      } else if (tasks.length) {
        await pushTasksToCloud();
        updateCloudStatus("Cloud: aktualni");
      } else {
        updateCloudStatus("Cloud: prazdny projekt");
      }
    }

    async function pushTasksToCloud() {
      if (!cloudConnected || !supabaseClient) return;
      const rows = tasks.map(taskToCloudRow);
      const ids = rows.map((r) => r.id);
      const { error: upsertError } = await supabaseClient.from(CLOUD_TABLE).upsert(rows, { onConflict: "id" });
      if (upsertError) throw upsertError;

      const { data: remoteIds, error: idsError } = await supabaseClient.from(CLOUD_TABLE).select("id");
      if (idsError) throw idsError;
      const toDelete = (remoteIds || []).map((r) => r.id).filter((id) => !ids.includes(id));
      if (toDelete.length) {
        const { error: deleteError } = await supabaseClient.from(CLOUD_TABLE).delete().in("id", toDelete);
        if (deleteError) throw deleteError;
      }
      hasUnsyncedLocalChanges = false;
    }

    async function pullTasksFromCloud() {
      if (!cloudConnected || !supabaseClient || hasUnsyncedLocalChanges) return;
      const { data, error } = await supabaseClient.from(CLOUD_TABLE).select("*").order("updated_at_ms", { ascending: false });
      if (error) throw error;
      if (!data) return;
      const remoteTasks = data.map(cloudRowToTask);
      if (JSON.stringify(remoteTasks) !== JSON.stringify(tasks)) {
        tasks = remoteTasks;
        saveTasks();
        render();
      }
    }

    async function runCloudSync(options) {
      const opts = options || {};
      if (!cloudConnected) {
        updateCloudStatus("Cloud: nepripojeno");
        if (opts.notifyIfDisconnected) {
          alert("Cloud neni pripojeny. Klikni nejdriv na 'Cloud pripojeni'.");
        }
        return;
      }
      if (syncInProgress) return;
      syncInProgress = true;
      updateCloudStatus("Cloud: synchronizace...");
      try {
        if (hasUnsyncedLocalChanges) {
          await pushTasksToCloud();
        }
        await pullTasksFromCloud();
        updateCloudStatus("Cloud: aktualni");
        if (opts.notifyOnSuccess) {
          alert("Synchronizace hotova.");
        }
      } catch {
        updateCloudStatus("Cloud: chyba synchronizace");
        if (opts.notifyOnError) {
          alert("Synchronizace selhala. Zkus znovu nebo zkontroluj pripojeni v Supabase.");
        }
      } finally {
        syncInProgress = false;
      }
    }

    function scheduleCloudSync() {
      if (!cloudConnected) return;
      clearTimeout(syncDebounceTimer);
      syncDebounceTimer = setTimeout(() => {
        runCloudSync();
      }, 1200);
    }

    function startCloudPolling() {
      clearInterval(syncPollTimer);
      syncPollTimer = setInterval(() => {
        runCloudSync();
      }, 30000);
    }

    function toCsvValue(value) {
      const escaped = String(value ?? "").replace(/"/g, '""');
      return `"${escaped}"`;
    }

    function exportCsv() {
      const header = ["id", "title", "priority", "status", "dueDate", "createdAt"];
      const rows = tasks.map((t) => [t.id, t.title, t.priority, t.status, t.dueDate, t.createdAt]);
      const csv = [header, ...rows].map((row) => row.map(toCsvValue).join(",")).join("\r\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const stamp = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `ukoly-dashboard-${stamp}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function parseCsvLine(line) {
      const out = [];
      let current = "";
      let inQuotes = false;
      for (let i = 0; i < line.length; i += 1) {
        const ch = line[i];
        const next = line[i + 1];
        if (ch === '"' && inQuotes && next === '"') {
          current += '"';
          i += 1;
        } else if (ch === '"') {
          inQuotes = !inQuotes;
        } else if (ch === "," && !inQuotes) {
          out.push(current);
          current = "";
        } else {
          current += ch;
        }
      }
      out.push(current);
      return out;
    }

    function importCsvText(text) {
      const lines = text.split(/\r?\n/).filter((l) => l.trim() !== "");
      if (lines.length < 2) {
        alert("CSV je prázdné nebo neobsahuje žádná data.");
        return;
      }

      const headers = parseCsvLine(lines[0]).map((h) => h.trim());
      const expected = ["id", "title", "priority", "status", "dueDate", "createdAt"];
      const isValidHeader = expected.every((key, idx) => headers[idx] === key);
      if (!isValidHeader) {
        alert("Neplatná hlavička CSV. Očekávám: id,title,priority,status,dueDate,createdAt");
        return;
      }

      const imported = [];
      for (let i = 1; i < lines.length; i += 1) {
        const cols = parseCsvLine(lines[i]);
        if (cols.length < 6) continue;

        const id = cols[0] || (crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()));
        const title = (cols[1] || "").trim();
        if (!title) continue;
        const priority = normalizePriority(cols[2]);
        const status = normalizeStatus(cols[3]);
        const dueDate = normalizeDate(cols[4]);
        const createdAtRaw = Number(cols[5]);
        const createdAt = Number.isFinite(createdAtRaw) ? createdAtRaw : Date.now();

        imported.push(normalizeTask({ id, title, priority, status, dueDate, createdAt }));
      }

      if (!imported.length) {
        alert("CSV neobsahuje žádné validní úkoly.");
        return;
      }

      tasks = imported;
      markDirtyAndSave();
      render();
      alert(`Import hotový: ${imported.length} úkolů.`);
    }

    function wireTaskActions(container) {
      container.addEventListener("click", (e) => {
        const btn = e.target.closest("button");
        if (!btn) return;
        const action = btn.dataset.action;
        const id = btn.dataset.id;
        const idx = tasks.findIndex((t) => t.id === id);
        if (idx < 0) return;

        if (action === "delete") {
          tasks.splice(idx, 1);
        } else if (action === "advance") {
          const next = nextStatus(tasks[idx].status);
          tasks[idx].status = next;
          tasks[idx].completedAt = next === "done" ? Date.now() : null;
          tasks[idx].updatedAt = Date.now();
        }
        markDirtyAndSave();
        render();
      });
    }

    function wireKanbanDnD() {
      document.addEventListener("dragstart", (e) => {
        const card = e.target.closest(".task-item[draggable='true']");
        if (!card) return;
        draggingTaskId = card.dataset.taskId;
        card.classList.add("dragging");
        if (e.dataTransfer) {
          e.dataTransfer.effectAllowed = "move";
          e.dataTransfer.setData("text/plain", draggingTaskId);
        }
      });

      document.addEventListener("dragend", (e) => {
        const card = e.target.closest(".task-item[draggable='true']");
        if (card) card.classList.remove("dragging");
        draggingTaskId = null;
        document.querySelectorAll(".kanban-dropzone").forEach((z) => z.classList.remove("drag-over"));
      });

      document.querySelectorAll(".kanban-dropzone").forEach((zone) => {
        zone.addEventListener("dragover", (e) => {
          e.preventDefault();
          zone.classList.add("drag-over");
        });
        zone.addEventListener("dragleave", () => {
          zone.classList.remove("drag-over");
        });
        zone.addEventListener("drop", (e) => {
          e.preventDefault();
          zone.classList.remove("drag-over");
          const id = draggingTaskId || (e.dataTransfer ? e.dataTransfer.getData("text/plain") : "");
          if (!id) return;
          const targetStatus = zone.dataset.status;
          setTaskStatus(id, targetStatus);
        });
      });
    }

    el.addTaskBtn.addEventListener("click", addTask);
    el.newTitle.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addTask();
    });

    ["searchInput", "filterStatus", "filterPriority", "sortBy"].forEach((key) => {
      el[key].addEventListener("input", render);
      el[key].addEventListener("change", render);
    });

    el.listViewBtn.addEventListener("click", () => setView("list"));
    el.kanbanViewBtn.addEventListener("click", () => setView("kanban"));
    el.exportCsvBtn.addEventListener("click", exportCsv);
    el.importCsvBtn.addEventListener("click", () => el.csvFileInput.click());
    el.copyReportBtn.addEventListener("click", copyReport);
    el.emailReportBtn.addEventListener("click", emailReport);
    el.connectCloudBtn.addEventListener("click", async () => {
      const current = getCloudConfig();
      const url = prompt("Supabase URL", current ? current.url : "");
      if (!url) return;
      const key = prompt("Supabase anon key", current ? current.anonKey : "");
      if (!key) return;
      await connectCloud(url.trim(), key.trim());
    });
    el.syncNowBtn.addEventListener("click", () => {
      runCloudSync({
        notifyIfDisconnected: true,
        notifyOnSuccess: true,
        notifyOnError: true
      });
    });
    el.csvFileInput.addEventListener("change", () => {
      const file = el.csvFileInput.files && el.csvFileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        importCsvText(String(reader.result || ""));
        el.csvFileInput.value = "";
      };
      reader.readAsText(file, "utf-8");
    });

    wireTaskActions(el.taskList);
    wireTaskActions(el.kanbanContainer);
    wireKanbanDnD();
    window.addEventListener("focus", () => {
      runCloudSync();
    });

    el.resetDemo.addEventListener("click", () => {
      const ok = confirm("Opravdu chceš smazat všechny úkoly?");
      if (!ok) return;
      tasks = [];
      markDirtyAndSave();
      render();
    });

    setView("kanban");
    render();
    (async () => {
      const config = getCloudConfig();
      if (!config) {
        updateCloudStatus("Cloud: lokální režim");
        return;
      }
      await connectCloud(config.url, config.anonKey);
    })();
  </script>
</body>
